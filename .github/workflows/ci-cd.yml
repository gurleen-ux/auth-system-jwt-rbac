name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_USERNAME: gurleen914
  DOCKER_IMAGE_BACKEND: auth-system-backend
  DOCKER_IMAGE_FRONTEND: auth-system-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Backend dependency check
        run: |
          cd backend
          npm install

      - name: Frontend build test
        run: |
          cd frontend
          npm install
          npm run build

  build-and-push-docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_BACKEND }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_FRONTEND }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }}

  deploy:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy notification
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Backend image: ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_BACKEND }}:latest"
          echo "Frontend image: ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_FRONTEND }}:latest"